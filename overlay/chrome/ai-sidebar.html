<!DOCTYPE html>
<!-- Aether AI sidebar (f7) — a static chrome-owned page: markup + CSS only,
     no script of its own and no external resources. aether.uc.js wires the
     prompt, fills the transcript (textContent only — model output is text,
     never markup), sets the off-state line from aether-strings, and injects
     the theme vars. chrome://userchrome/content/ai-sidebar.html -->
<html>
<head>
  <meta charset="utf-8">
  <title>aether ai</title>
  <style>
    /* Fallbacks are the gruvbox hexes — same rule as userChrome.css, so the
       panel renders sanely even before the theme style arrives. */
    html, body {
      margin: 0;
      height: 100%;
      background-color: var(--aether-bg, #1d2021);
      color: var(--aether-fg, #ebdbb2);
      font: 12px monospace;
    }
    body {
      display: flex;
      flex-direction: column;
    }
    #aether-ai-transcript {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #aether-ai-transcript .aether-ai-turn {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    #aether-ai-transcript .aether-ai-turn-user {
      color: var(--aether-color4, #458588);
    }
    #aether-ai-transcript .aether-ai-turn-user::before {
      content: "> ";
      font-weight: bold;
    }
    #aether-ai-transcript .aether-ai-turn-note {
      /* gateway-unreachable / off-state lines: quiet, not alarming */
      opacity: 0.7;
      font-style: italic;
    }
    #aether-ai-off {
      margin: 0;
      padding: 4px 8px;
      opacity: 0.7;
      font-style: italic;
    }
    #aether-ai-input {
      margin: 0;
      padding: 6px 8px;
      font: inherit;
      color: inherit;
      background-color: color-mix(in srgb, currentColor 8%, transparent);
      border: none;
      border-top: 1px solid color-mix(in srgb, currentColor 20%, transparent);
      outline: none;
    }
    #aether-ai-input:disabled {
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <main id="aether-ai-transcript"></main>
  <p id="aether-ai-off" hidden></p>
  <input id="aether-ai-input" type="text">
</body>
</html>
