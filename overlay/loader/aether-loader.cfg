
// AETHER-LOADER — appended to the browser's autoconfig file (librewolf.cfg /
// config.js). Registers chrome://userscripts/ from the profile's chrome/ dir
// and loads aether.uc.js into every browser window. Replaces fx-autoconfig.
try {
  (function aetherLoader() {
    const { interfaces: Ci } = Components;
    const manifest = Services.dirsvc.get("ProfD", Ci.nsIFile);
    manifest.append("chrome");
    manifest.append("chrome.manifest");
    if (!manifest.exists()) {
      return;
    }
    Components.manager.QueryInterface(Ci.nsIComponentRegistrar).autoRegister(manifest);

    const loadInto = win => {
      try {
        const root = win.document?.documentElement;
        if (root?.getAttribute("windowtype") === "navigator:browser" && !win._aetherLoaded) {
          win._aetherLoaded = true;
          Services.scriptloader.loadSubScript(
            "chrome://userscripts/content/aether.uc.js",
            win
          );
        }
      } catch (e) {
        console.error("[aether-loader] window load failed:", e);
      }
    };

    Services.obs.addObserver(subject => loadInto(subject), "browser-delayed-startup-finished");
    // Windows that finished startup before we registered (unlikely, but cheap):
    for (const win of Services.wm.getEnumerator("navigator:browser")) {
      if (win.gBrowserInit?.delayedStartupFinished) {
        loadInto(win);
      }
    }
  })();
} catch (e) {
  console.error("[aether-loader] init failed:", e);
}
